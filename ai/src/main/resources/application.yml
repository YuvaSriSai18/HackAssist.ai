spring:
    security:
        oauth2:
            client:
                registration:
                    google:
                        client-id: client-id
                        client-secret: client-secret
                        scope:
                            - profile
                            - openid
                            - email
                provider:
                    google:
                        authorization-uri: https://accounts.google.com/o/oauth2/v2/auth 
                        token-uri: https://oauth2.googleapis.com/token
                        user-info-uri: https://www.googleapis.com/