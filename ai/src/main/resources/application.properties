spring.application.name=hackassist.ai

# Load local environment values from .env when present (looks in project root and parent directory)
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# Server Configuration
server.port=8080
server.servlet.context-path=/

# ================= DATABASE =================
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ================= JPA =================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Disable SQL init (good for debugging)
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:schema.sql

# JWT Configuration
jwt.secret.key=${JWT_SECRET_KEY:}
jwt.expiration.time=86400000

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY:}

# GitHub Webhook Configuration
# Security: Webhooks are verified by repo existence in database only
# Webhook secret is NOT stored as we trust the authenticated webhook creation
app.webhook.callback-url=https://zxz4vg1w-8080.inc1.devtunnels.ms/webhook/github
app.webhook.events=push


# Logging Configuration
logging.level.root=INFO
logging.level.com.hackassist.ai=DEBUG
logging.pattern.console=%d{HH:mm:ss} - %msg%n
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=10

