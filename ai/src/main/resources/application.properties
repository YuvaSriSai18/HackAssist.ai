spring.application.name=hackassist.ai

# Load local environment values from .env when present (looks in project root and parent directory)
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration (MySQL only)
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:hackassist}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
    
# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT Configuration
jwt.secret.key=${JWT_SECRET_KEY:}
jwt.expiration.time=86400000

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY:}
gemini.model.name=gemini-3-flash-preview


# Logging Configuration
logging.level.root=INFO
logging.level.com.hackassist.ai=DEBUG
logging.pattern.console=%d{HH:mm:ss} - %msg%n
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=10

