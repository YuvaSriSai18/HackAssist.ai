spring.application.name=ai

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:hackathondb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# MySQL Configuration (uncomment for production)
# spring.datasource.url=jdbc:mysql://localhost:3306/hackathon_db
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=password

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY:}
gemini.model.name=gemini-pro

# GitHub API Configuration
github.api.url=https://api.github.com
github.oauth.client-id=${GITHUB_CLIENT_ID:}
github.oauth.client-secret=${GITHUB_CLIENT_SECRET:}

# Google OAuth2.0 Configuration (Disabled - configure with valid credentials)
spring.security.oauth2.client.registration.google.client-id=768724746378-h5acv04o94adf84uoc5279dq4sg6p869.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=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
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/api/login/oauth2/code/google
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth

# JWT Configuration
jwt.secret.key=8111b443a0a16c50d0ab3391d77ed9ec548d066a551f188fc1c0253620bebbbc
jwt.expiration.time=86400000

# Logging Configuration
logging.level.root=INFO
logging.level.com.hackassist.ai=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=10
